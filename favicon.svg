<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo redondeado con gradiente cian -> morado -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>

  <!-- Rectángulo redondeado de fondo -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Símbolo &lt;/&gt; estilizado (estilo developer) -->
  <path d="M22 20 L14 32 L22 44"
        stroke="#0a0e1a"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <path d="M42 20 L50 32 L42 44"
        stroke="#0a0e1a"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <!-- Barra diagonal del medio (opcional, estilo "/") -->
  <line x1="36" y1="20" x2="28" y2="44"
        stroke="#0a0e1a"
        stroke-width="4"
        stroke-linecap="round"/>
</svg>
